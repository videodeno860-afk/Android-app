name: Scientist AI Ultimate Automated Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_complete_app:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Minimal Workspace
      uses: actions/checkout@v4

    - name: Setup Java JDK 17 Environment
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Pure Android Architecture From Scratch
      run: |
        echo "Creating source directories..."
        mkdir -p app/src/main/java/com/ai/scientist/inventor
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values

        # 1. ROOT GRADLE CONFIGURATION
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects {
            repositories { google(); mavenCentral() }
        }
        EOF

        # 2. APP MODULE BUILD GRADLE (Bypassing all style constraints)
        cat << 'EOF' > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.ai.scientist.inventor'
            compileSdk 34
            defaultConfig {
                applicationId "com.ai.scientist.inventor"
                minSdk 26
                targetSdk 34
                versionCode 1
                versionName "1.0.0"
            }
            buildTypes { release { minifyEnabled false } }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
        }
        EOF

        echo "include ':app'" > settings.gradle

        # 3. FIXED TOTAL VALUES & CORE COMPATIBLE SYSTEM THEME
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">Scientist AI</string>
        </resources>
        EOF

        cat << 'EOF' > app/src/main/res/values/themes.xml
        <resources>
            <style name="Theme.ScientistAI" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                <item name="colorPrimary">#6200EE</item>
                <item name="colorSecondary">#03DAC6</item>
                <item name="android:windowBackground">#121212</item>
            </style>
        </resources>
        EOF

        # 4. ALL SEPARATE INDIVIDUAL UI SCREENS XML LAYOUTS

        # Layout 1: Main Menu Router
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:orientation="vertical"
            android:padding="16dp"
            android:gravity="center"
            android:background="#121212">
            <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="🔬 SCIENTIST AI ENGINE" android:textColor="#FFFFFF" android:textSize="26sp" android:textStyle="bold" android:layout_marginBottom="24dp"/>
            <Button android:id="@+id/btn_signup" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="1. Signup Page" android:layout_marginBottom="8dp" android:backgroundTint="#6200EE"/>
            <Button android:id="@+id/btn_wallet" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="2. Wallet Page" android:layout_marginBottom="8dp" android:backgroundTint="#03DAC6"/>
            <Button android:id="@+id/btn_home" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="3. Home/3D Canvas" android:layout_marginBottom="8dp" android:backgroundTint="#BB86FC"/>
            <Button android:id="@+id/btn_projects" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="4. Saved Project List" android:layout_marginBottom="8dp" android:backgroundTint="#018786"/>
            <Button android:id="@+id/btn_profile" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="5. Profile Page" android:layout_marginBottom="8dp" android:backgroundTint="#3700B3"/>
            <Button android:id="@+id/btn_chat" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="6. Chat / Scientist AI" android:backgroundTint="#CF6679"/>
        </LinearLayout>
        EOF

        # Layout 2: Signup
        cat << 'EOF' > app/src/main/res/layout/activity_signup.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:orientation="vertical"
            android:padding="24dp"
            android:background="#1E1E1E">
            <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="🔒 Secure Signup Vault" android:textColor="#FFFFFF" android:textSize="22sp" android:layout_marginBottom="16dp"/>
            <EditText android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="Enter Secure Details" android:textColorHint="#888888" android:textColor="#FFFFFF"/>
        </LinearLayout>
        EOF

        # Layout 3: Wallet Ledger
        cat << 'EOF' > app/src/main/res/layout/activity_wallet.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:orientation="vertical"
            android:padding="24dp"
            android:background="#1E1E1E">
            <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="💰 Dual Currency Balance Monitor" android:textColor="#FFFFFF" android:textSize="20sp"/>
            <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Balance Tracker Ready" android:textColor="#00FF00" android:layout_marginTop="16dp"/>
        </LinearLayout>
        EOF

        # Layout 4: Home Canvas Controls
        cat << 'EOF' > app/src/main/res/layout/activity_home_canvas.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:orientation="vertical"
            android:background="#1E1E1E">
            <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:gravity="center" android:padding="12dp" android:background="#252525">
                <Button android:id="@+id/btn_undo" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="↩ Undo" android:layout_marginEnd="8dp"/>
                <Button android:id="@+id/btn_redo" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="↪ Redo" android:layout_marginEnd="8dp"/>
                <Button android:id="@+id/btn_save" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="💾 Save" android:backgroundTint="#00875A"/>
            </LinearLayout>
            <View android:layout_width="match_parent" android:layout_height="250dp" android:background="#2D2D2D" android:layout_margin="16dp"/>
        </LinearLayout>
        EOF

        # Layout 5: Projects List
        cat << 'EOF' > app/src/main/res/layout/activity_projects_list.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:orientation="vertical"
            android:padding="16dp"
            android:background="#121212">
            <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="📁 Invention Project Dashboard" android:textColor="#FFFFFF" android:textSize="22sp" android:layout_marginBottom="16dp"/>
            <TextView android:layout_width="match_parent" android:layout_height="wrap_content" android:text="🚀 System Database List Sync Terminal" android:textColor="#03DAC6" android:background="#1E1E1E" android:padding="16dp"/>
        </LinearLayout>
        EOF

        # Layout 6: Profile Portfolio
        cat << 'EOF' > app/src/main/res/layout/activity_profile.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:padding="24dp"
            android:background="#1E1E1E">
            <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="👤 Profile Workspace" android:textColor="#FFFFFF" android:textSize="22sp"/>
        </LinearLayout>
        EOF

        # Layout 7: Scientific AI Chat
        cat << 'EOF' > app/src/main/res/layout/activity_chat.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:orientation="vertical"
            android:padding="16dp"
            android:background="#121212">
            <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="🧠 Scientist AI Core Chat Terminal" android:textColor="#FFFFFF" android:textSize="20sp"/>
            <View android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1" android:background="#1E1E1E" android:layout_marginTop="12dp"/>
        </LinearLayout>
        EOF

        # 5. ALL CORRESPONDING JAVA CONTROL CONTROLLERS
        cat << 'EOF' > app/src/main/java/com/ai/scientist/inventor/MainActivity.java
        package com.ai.scientist.inventor;
        import android.content.Intent;
        import android.os.Bundle;
        import androidx.appcompat.app.AppCompatActivity;

        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);

                findViewById(R.id.btn_signup).setOnClickListener(v -> startActivity(new Intent(MainActivity.this, SignupActivity.class)));
                findViewById(R.id.btn_wallet).setOnClickListener(v -> startActivity(new Intent(MainActivity.this, WalletActivity.class)));
                findViewById(R.id.btn_home).setOnClickListener(v -> startActivity(new Intent(MainActivity.this, HomeCanvasActivity.class)));
                findViewById(R.id.btn_projects).setOnClickListener(v -> startActivity(new Intent(MainActivity.this, ProjectsListActivity.class)));
                findViewById(R.id.btn_profile).setOnClickListener(v -> startActivity(new Intent(MainActivity.this, ProfileActivity.class)));
                findViewById(R.id.btn_chat).setOnClickListener(v -> startActivity(new Intent(MainActivity.this, ChatActivity.class)));
            }
        }
        EOF

        cat << 'EOF' > app/src/main/java/com/ai/scientist/inventor/HomeCanvasActivity.java
        package com.ai.scientist.inventor;
        import android.os.Bundle;
        import android.widget.Toast;
        import androidx.appcompat.app.AppCompatActivity;

        public class HomeCanvasActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_home_canvas);
                findViewById(R.id.btn_undo).setOnClickListener(v -> Toast.makeText(this, "Undo triggered", Toast.LENGTH_SHORT).show());
                findViewById(R.id.btn_redo).setOnClickListener(v -> Toast.makeText(this, "Redo triggered", Toast.LENGTH_SHORT).show());
                findViewById(R.id.btn_save).setOnClickListener(v -> Toast.makeText(this, "Invention Saved!", Toast.LENGTH_SHORT).show());
            }
        }
        EOF

        echo -e "package com.ai.scientist.inventor;\nimport android.os.Bundle;\nimport androidx.appcompat.app.AppCompatActivity;\npublic class SignupActivity extends AppCompatActivity { @Override protected void onCreate(Bundle b) { super.onCreate(b); setContentView(R.layout.activity_signup); } }" > app/src/main/java/com/ai/scientist/inventor/SignupActivity.java
        echo -e "package com.ai.scientist.inventor;\nimport android.os.Bundle;\nimport androidx.appcompat.app.AppCompatActivity;\npublic class WalletActivity extends AppCompatActivity { @Override protected void onCreate(Bundle b) { super.onCreate(b); setContentView(R.layout.activity_wallet); } }" > app/src/main/java/com/ai/scientist/inventor/WalletActivity.java
        echo -e "package com.ai.scientist.inventor;\nimport android.os.Bundle;\nimport androidx.appcompat.app.AppCompatActivity;\npublic class ProjectsListActivity extends AppCompatActivity { @Override protected void onCreate(Bundle b) { super.onCreate(b); setContentView(R.layout.activity_projects_list); } }" > app/src/main/java/com/ai/scientist/inventor/ProjectsListActivity.java
        echo -e "package com.ai.scientist.inventor;\nimport android.os.Bundle;\nimport androidx.appcompat.app.AppCompatActivity;\npublic class ProfileActivity extends AppCompatActivity { @Override protected void onCreate(Bundle b) { super.onCreate(b); setContentView(R.layout.activity_profile); } }" > app/src/main/java/com/ai/scientist/inventor/ProfileActivity.java
        echo -e "package com.ai.scientist.inventor;\nimport android.os.Bundle;\nimport androidx.appcompat.app.AppCompatActivity;\npublic class ChatActivity extends AppCompatActivity { @Override protected void onCreate(Bundle b) { super.onCreate(b); setContentView(R.layout.activity_chat); } }" > app/src/main/java/com/ai/scientist/inventor/ChatActivity.java

        # 6. APP MANIFEST SYSTEM PIPELINE
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <application
                android:allowBackup="true"
                android:label="@string/app_name"
                android:supportsRtl="true"
                android:theme="@style/Theme.ScientistAI">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                <activity android:name=".SignupActivity" />
                <activity android:name=".WalletActivity" />
                <activity android:name=".HomeCanvasActivity" />
                <activity android:name=".ProjectsListActivity" />
                <activity android:name=".ProfileActivity" />
                <activity android:name=".ChatActivity" />
            </application>
        </manifest>
        EOF

        gradle wrapper --gradle-version 8.2.2
        chmod +x gradlew
        echo "Source Generation Successfully Finished."

    - name: Run Direct Gradle Compile Engine
      run: ./gradlew assembleDebug --no-daemon

    - name: Convert Workspace to Backup ZIP
      run: |
        sudo apt-get install -y zip
        zip -r scientist_ai_final_source.zip . -x "*.git*" -x "*.gradle*" -x "*/build/*"

    - name: Upload Final Unsigned APK Product
      uses: actions/upload-artifact@v4
      with:
        name: Scientist-AI-Production-APK
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Editable Full ZIP Backup Bundle
      uses: actions/upload-artifact@v4
      with:
        name: Scientist-AI-Source-ZIP
        path: scientist_ai_final_source.zip
        
